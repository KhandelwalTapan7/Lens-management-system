services:
  - type: web
    name: eluno-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGO_URI
        value: ${MONGO_URI}
      - key: ML_SERVICE_URL
        value: https://eluno-ml.onrender.com/predict
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ${SMTP_USER}
      - key: SMTP_PASS
        value: ${SMTP_PASS}
      - key: ALERT_EMAIL_TO
        value: ${ALERT_EMAIL_TO}
    healthCheckPath: /api/health

  - type: web
    name: eluno-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist

  - type: web
    name: eluno-ml
    env: python
    buildCommand: cd ml && pip install -r requirements.txt && python model/train.py
    startCommand: cd ml/model && uvicorn predict:app --host 0.0.0.0 --port 10000